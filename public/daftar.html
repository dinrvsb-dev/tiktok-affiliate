<!doctype html>
<html lang="ms">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pendaftaran Affiliate</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
      .form-card {
        max-width: 640px;
        margin: 0 auto;
        padding: 36px;
      }
      .form-card h1 { font-size: 2rem; margin-bottom: 6px; }
      .form-card .intro { color: var(--muted); margin-bottom: 28px; }
      .success-box {
        display: none;
        background: rgba(37,110,76,0.1);
        border: 1px solid rgba(37,110,76,0.3);
        border-radius: 18px;
        padding: 28px;
        text-align: center;
        color: var(--success);
      }
      .success-box h2 { margin: 0 0 8px; }
      .divider {
        grid-column: 1 / -1;
        border: none;
        border-top: 1px solid var(--line);
        margin: 4px 0;
      }
      .section-label {
        grid-column: 1 / -1;
        font-size: 0.82rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--accent-dark);
        margin-bottom: -6px;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <p class="eyebrow">TikTok Affiliate</p>
        <h1>Borang Pendaftaran</h1>
        <p class="intro">Sila isi maklumat lengkap anda. Admin akan semak dan menghubungi anda.</p>
      </section>

      <div class="card form-card">
        <div id="successBox" class="success-box">
          <h2>Pendaftaran Berjaya!</h2>
          <p>Maklumat anda telah dihantar. Admin akan menghubungi anda tidak lama lagi.</p>
        </div>

        <form id="daftarForm" class="grid two-col">
          <p class="section-label">Maklumat Peribadi</p>

          <label style="grid-column:1/-1">
            <span>Nama Penuh *</span>
            <input name="namaLengkap" placeholder="Nama penuh mengikut IC" required>
          </label>

          <label>
            <span>No. Telefon *</span>
            <input name="noFon" type="tel" placeholder="0123456789" required>
          </label>

          <label>
            <span>Emel *</span>
            <input name="emel" type="email" placeholder="contoh@gmail.com" required>
          </label>

          <p class="section-label" style="margin-top:4px">Alamat Penghantaran</p>

          <label style="grid-column:1/-1">
            <span>Baris 1 (No. rumah & jalan)</span>
            <input name="alamatBaris1" placeholder="cth: No. 12, Jalan Bahagia 3">
          </label>
          <label style="grid-column:1/-1">
            <span>Baris 2</span>
            <input name="alamatBaris2" placeholder="cth: Taman Maju">
          </label>
          <label style="grid-column:1/-1">
            <span>Baris 3</span>
            <input name="alamatBaris3" placeholder="cth: Fasa 2 (optional)">
          </label>

          <label>
            <span>Poskod</span>
            <input name="poskod" id="poskod" maxlength="5" placeholder="cth: 47500" inputmode="numeric">
          </label>
          <div></div>

          <label>
            <span>Daerah</span>
            <input name="daerah" id="daerah" placeholder="Auto-fill (boleh edit)">
          </label>
          <label>
            <span>Negeri</span>
            <input name="negeri" id="negeri" placeholder="Auto-fill (boleh edit)">
          </label>

          <hr class="divider">
          <p class="section-label">Maklumat TikTok</p>

          <label style="grid-column:1/-1">
            <span>Akaun TikTok Anda Sekarang</span>
            <input name="akauntTiktok" placeholder="@username">
          </label>

          <hr class="divider">
          <p class="section-label">Maklumat Bank</p>

          <label>
            <span>Nama Bank</span>
            <select name="namaBank">
              <option value="">-- Pilih Bank --</option>
              <optgroup label="Bank Perdagangan">
                <option>Maybank</option>
                <option>CIMB Bank</option>
                <option>Public Bank</option>
                <option>RHB Bank</option>
                <option>Hong Leong Bank</option>
                <option>AmBank</option>
                <option>UOB Malaysia</option>
                <option>OCBC Bank Malaysia</option>
                <option>HSBC Bank Malaysia</option>
                <option>Standard Chartered Malaysia</option>
                <option>Citibank Malaysia</option>
                <option>Alliance Bank</option>
                <option>Affin Bank</option>
                <option>Bank Rakyat</option>
                <option>Bank Islam</option>
                <option>Bank Muamalat</option>
                <option>BSN (Bank Simpanan Nasional)</option>
                <option>Agrobank</option>
                <option>Bank Pertanian Malaysia</option>
              </optgroup>
              <optgroup label="Bank Digital &amp; E-Wallet">
                <option>GX Bank</option>
                <option>Boost Bank</option>
                <option>Touch 'n Go (TNG Digital)</option>
                <option>Grab Financial</option>
              </optgroup>
              <optgroup label="Lain-lain">
                <option>Lain-lain</option>
              </optgroup>
            </select>
          </label>

          <label>
            <span>No. Akaun Bank</span>
            <input name="noAkauntBank" placeholder="1234567890">
          </label>

          <div style="grid-column:1/-1" class="actions">
            <button type="submit" class="primary">Hantar Pendaftaran</button>
          </div>

          <p id="errMsg" style="grid-column:1/-1;color:var(--danger);display:none"></p>
        </form>
      </div>
    </main>
